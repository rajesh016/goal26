name: Update Live Scores & News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run AI Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agent.js

      - name: Commit updated data
        run: |
          git config --global user.email "agent@goal26.app"
          git config --global user.name "GOAL26 AI Agent"
          git add src/data.js
          git diff --staged --quiet || git commit -m "🤖 Auto-update: scores & news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
